<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- <link rel="stylesheet" href="styles.css"> -->
  <link rel="stylesheet" href="./styles.css">
  
  <title>Frontend Mentor | Social links profile</title>


  
</head>
<body>

  <div class="body-container">
   
      <img alt="profile-pic" class="display-pic" src="./assets/images/avatar-jessica.jpeg"/>


      <div class="name-and-location">
        <p class="user-name">
          Jessica Randall
        </p>
        <p class="user-location">
          London, United Kingdom
        </p>
      </div>


      <h4 class="user-description">
        "Front-end developer and avid reader."
      </h4>
    

      <div class="user-contact-panel">
        <p class="contact-link">GitHub</p>
        <p class="contact-link">Frontend Mentor</p>
        <p class="contact-link">LinkedIn</p>
        <p class="contact-link">Twitter</p>
        <p class="contact-link">Instagram</p>
      </div>

 
    
    
  </div>
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">4lphav01d</a>.
  </footer>

</body>
</html>
